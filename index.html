<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Semangat!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,300&family=Lato:wght@300;400&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#0a0810; font-family:'Lato',sans-serif; }
#canvas { display:block; width:100vw; height:100vh; }
#crosshair-dot { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:5px; height:5px; background:rgba(255,220,180,0.8); border-radius:50%; pointer-events:none; z-index:10; box-shadow:0 0 0 1.5px rgba(0,0,0,0.5); }
#start-screen { position:fixed; inset:0; z-index:400; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; pointer-events:none; transition:opacity 1.2s ease; }
#landscape-anim { display:flex; flex-direction:column; align-items:center; gap:16px; }
#phone-wrap { position:relative; width:50px; height:50px; display:flex; align-items:center; justify-content:center; }
#phone-icon { width:26px; height:46px; border:2px solid rgba(255,255,255,0.3); border-radius:5px; position:relative; animation:rotateLandscape 3s cubic-bezier(0.4,0,0.2,1) infinite; }
#phone-icon::before { content:''; position:absolute; bottom:5px; left:50%; transform:translateX(-50%); width:9px; height:2px; background:rgba(255,255,255,0.25); border-radius:2px; }
@keyframes rotateLandscape { 0%,30%{transform:rotate(0deg)} 55%,85%{transform:rotate(-90deg)} 100%{transform:rotate(0deg)} }
#landscape-text { color:rgba(255,255,255,0.22); font-size:9px; letter-spacing:2.5px; text-align:center; text-transform:uppercase; }
#loading-bar-wrap { width:150px; height:1px; background:rgba(255,255,255,0.08); border-radius:1px; overflow:hidden; }
#loading-bar { height:100%; background:rgba(255,255,255,0.5); width:0%; transition:width 0.2s linear; border-radius:1px; }
#loading-percent { font-size:9px; letter-spacing:3px; color:rgba(255,255,255,0.2); }
#blink-top, #blink-bot { position:fixed; left:0; right:0; height:0%; z-index:200; background:#000; pointer-events:none; transition:height 0.12s ease-in-out; }
#blink-top { top:0; } #blink-bot { bottom:0; }
#sleep-vignette { position:fixed; inset:0; z-index:15; pointer-events:none; background:radial-gradient(ellipse at center, transparent 40%, rgba(5,3,10,0.5) 75%, rgba(5,3,10,0.85) 100%); opacity:0; transition:opacity 2s ease; }
#sleep-vignette.active { opacity:1; }
#warmth-tint { position:fixed; inset:0; z-index:14; pointer-events:none; background:rgba(255,160,60,0); transition:background 1.2s ease; }
#mission-box { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:30; pointer-events:none; background:rgba(10,8,20,0.72); border:1px solid rgba(180,140,100,0.3); border-radius:12px; padding:10px 22px; backdrop-filter:blur(8px); text-align:center; min-width:260px; max-width:90vw; transition:opacity 0.5s; }
#mission-title { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,200,130,0.6); margin-bottom:4px; }
#mission-text { font-size:13px; color:rgba(255,235,200,0.9); font-family:'Playfair Display',serif; font-style:italic; }
#carry-indicator { position:fixed; bottom:110px; right:24px; z-index:30; pointer-events:none; display:none; flex-direction:column; align-items:center; gap:4px; }
#carry-icon { font-size:32px; animation:carryBob 1.2s ease-in-out infinite; }
@keyframes carryBob { 0%,100%{transform:translateY(0) rotate(-8deg)} 50%{transform:translateY(-5px) rotate(4deg)} }
#carry-label { font-size:9px; letter-spacing:2px; color:rgba(255,200,130,0.7); }

/* ── Dream overlay: teks + audio ── */
#dream-overlay {
  position:fixed; inset:0; z-index:250;
  background:#000;
  display:none; align-items:center; justify-content:center;
}
#dream-overlay.on { display:flex; }
#dream-vignette { position:absolute; inset:0; pointer-events:none; z-index:1; background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.8) 100%); }

#dream-text-wrap {
  position:relative; z-index:2;
  width:min(580px, 88vw);
  padding:0 12px;
  text-align:center;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:160px;
}
#dream-line {
  font-family:'Playfair Display', serif;
  font-style:italic;
  font-size:clamp(18px, 4.5vw, 30px);
  line-height:1.65;
  color:rgba(255,230,190,0);
  transition:color 0.6s ease, opacity 0.6s ease;
  opacity:0;
  letter-spacing:0.5px;
}
#dream-line.visible {
  color:rgba(255,230,190,0.92);
  opacity:1;
}
#dream-progress {
  position:absolute;
  bottom:20px; left:50%;
  transform:translateX(-50%);
  width:min(220px, 60vw);
  height:1px;
  background:rgba(255,255,255,0.08);
  border-radius:1px;
  overflow:hidden;
  z-index:2;
}
#dream-progress-bar {
  height:100%;
  background:rgba(255,200,130,0.45);
  width:0%;
  transition:width 0.3s linear;
  border-radius:1px;
}

#sleep-well { position:fixed; inset:0; z-index:350; background:#000; display:none; flex-direction:column; align-items:center; justify-content:center; gap:16px; opacity:0; transition:opacity 2s ease; }
#sleep-well.on { display:flex; } #sleep-well.visible { opacity:1; }
#sleep-well-title { font-family:'Playfair Display',serif; font-size:clamp(28px,6vw,58px); font-weight:400; letter-spacing:3px; color:rgba(255,235,200,0.95); text-align:center; line-height:1.3; }
#sleep-well-sub { font-family:'Playfair Display',serif; font-size:clamp(13px,2.5vw,20px); font-style:italic; letter-spacing:2px; color:rgba(255,210,150,0.6); text-align:center; }
#sleep-well-stars { font-size:18px; letter-spacing:10px; color:rgba(255,220,160,0.35); margin-bottom:4px; }
#mobile-controls { position:fixed; bottom:20px; left:0; right:0; display:none; z-index:50; justify-content:space-between; align-items:flex-end; padding:0 20px; pointer-events:none; }
#joystick-zone { width:120px; height:120px; position:relative; pointer-events:all; }
#joystick-base { width:100%; height:100%; background:rgba(255,200,130,0.06); border-radius:50%; border:2px solid rgba(255,200,130,0.18); position:relative; }
#joystick-knob { width:48px; height:48px; background:rgba(255,200,130,0.22); border-radius:50%; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); border:2px solid rgba(255,200,130,0.45); }
#tap-btn { position:fixed; bottom:30px; right:24px; width:72px; height:72px; background:rgba(180,130,80,0.22); border-radius:50%; border:2px solid rgba(255,190,100,0.55); color:#fff; font-size:11px; font-weight:bold; letter-spacing:1px; text-align:center; display:none; z-index:50; pointer-events:all; cursor:pointer; backdrop-filter:blur(6px); flex-direction:column; align-items:center; justify-content:center; gap:2px; box-shadow:0 0 18px rgba(255,160,60,0.15); user-select:none; -webkit-user-select:none; }
#tap-btn .tap-icon { font-size:22px; line-height:1; }
#tap-btn .tap-label { font-size:9px; letter-spacing:1.5px; opacity:0.8; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="crosshair-dot"></div>
<div id="blink-top"></div>
<div id="blink-bot"></div>
<div id="sleep-vignette"></div>
<div id="warmth-tint"></div>
<div id="mission-box">
  <div id="mission-title">Misi</div>
  <div id="mission-text">Memuat...</div>
</div>
<div id="carry-indicator">
  <div id="carry-icon">&#x1F43B;</div>
  <div id="carry-label">DIBAWA</div>
</div>

<!-- Dream overlay: teks timeline -->
<div id="dream-overlay">
  <div id="dream-vignette"></div>
  <div id="dream-text-wrap">
    <div id="dream-line"></div>
  </div>
  <div id="dream-progress"><div id="dream-progress-bar"></div></div>
</div>

<div id="sleep-well">
  <div id="sleep-well-stars">✦ ✦ ✦</div>
  <div id="sleep-well-title">Selamat Beristirahat</div>
  <div id="sleep-well-sub">Rest your mind, recharge your soul</div>
</div>
<div id="start-screen">
  <div id="landscape-anim">
    <div id="phone-wrap"><div id="phone-icon"></div></div>
    <div id="landscape-text">putar ke landscape</div>
  </div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-percent">0%</div>
</div>
<div id="mobile-controls">
  <div id="joystick-zone"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
</div>
<div id="tap-btn">
  <span class="tap-icon">&#x1F91A;</span>
  <span class="tap-label">TAP</span>
</div>

<!-- Audio -->
<audio id="dream-audio" src="song.mp3" preload="auto"></audio>

var TOTAL_DURATION=91;

var dreamRunning=false,dreamStartTime=0,dreamCurrentIdx=-1;

function startDream(){
  var overlay=document.getElementById('dream-overlay');
  var lineEl=document.getElementById('dream-line');
  var audio=document.getElementById('dream-audio');

  overlay.classList.add('on');
  dreamRunning=true;
  dreamStartTime=performance.now();
  dreamCurrentIdx=-1;

  // Mulai musik
  audio.currentTime=0;
  audio.volume=0;
  audio.play().catch(function(){});
  // Fade in musik
  var vol=0;
  var fadeIn=setInterval(function(){
    vol=Math.min(1,vol+0.04);
    audio.volume=vol;
    if(vol>=1)clearInterval(fadeIn);
  },80);

  openEyes(1600);
  runDreamTick();
}

function runDreamTick(){
  if(!dreamRunning)return;
  var elapsed=(performance.now()-dreamStartTime)/1000;
  var progressBar=document.getElementById('dream-progress-bar');
  var lineEl=document.getElementById('dream-line');

  // Update progress bar
  var pct=Math.min(100,(elapsed/TOTAL_DURATION)*100);
  progressBar.style.width=pct+'%';

  // Cari baris yang aktif
  var activeIdx=-1;
  for(var i=0;i<TIMELINE.length;i++){
    if(elapsed>=TIMELINE[i].start&&elapsed<TIMELINE[i].end){activeIdx=i;break;}
  }

  if(activeIdx!==dreamCurrentIdx){
    dreamCurrentIdx=activeIdx;
    lineEl.classList.remove('visible');
    if(activeIdx>=0){
      setTimeout(function(txt){
        lineEl.textContent=txt;
        lineEl.classList.add('visible');
      }.bind(null,TIMELINE[activeIdx].text),300);
    } else {
      lineEl.textContent='';
    }
  }

  // Selesai
  if(elapsed>=TOTAL_DURATION){
    dreamRunning=false;
    lineEl.classList.remove('visible');
    // Fade out musik
    var audio=document.getElementById('dream-audio');
    var vol=audio.volume;
    var fadeOut=setInterval(function(){
      vol=Math.max(0,vol-0.03);
      audio.volume=vol;
      if(vol<=0){clearInterval(fadeOut);audio.pause();}
    },60);
    setTimeout(function(){
      closeEyes(800,function(){
        document.getElementById('dream-overlay').classList.remove('on');
        showSleepWell();
      });
    },600);
    return;
  }

  requestAnimationFrame(runDreamTick);
}

r!==mobileLookId)continue;if(isLyingDown)continue;var dx=t.clientX-mobileLookLast.x,dy=t.clientY-mobileLookLast.y;if(Math.abs(dx)>4||Math.abs(dy)>4)dragMoved=true;yaw-=dx*0.004;pitch=Math.max(-1.1,Math.min(0.9,pitch-dy*0.004));mobileLookLast={x:t.clientX,y:t.clientY};}},{passive:true});document.getElementById('canvas').addEventListener('touchend',function(e){for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];if(t.identifier!==mobileLookId)continue;mobileLookActive=false;if(!dragMoved&&gameStage<4)handleInteract();}},{passive:true});}
function updateMovement(dt){if(!gameStarted||isLyingDown||gameStage>=4)return;var speed=2.2*dt,forward=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw)),right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw)),dir=new THREE.Vector3();if(keys['KeyW']||keys['ArrowUp'])dir.addScaledVector(forward,speed);if(keys['KeyS']||keys['ArrowDown'])dir.addScaledVector(forward,-speed);if(keys['KeyA']||keys['ArrowLeft'])dir.addScaledVector(right,-speed);if(keys['KeyD']||keys['ArrowRight'])dir.addScaledVector(right,speed);if(joystickActive){dir.addScaledVector(forward,-joystickDelta.y*speed*1.3);dir.addScaledVector(right,joystickDelta.x*speed*1.3);}camera.position.add(dir);camera.position.y=1.62;clampPosition(camera.position);}
function updateLamp(t){if(!lampOn)return;var flicker=1.0+Math.sin(t*2.1)*0.03+Math.sin(t*6.7)*0.018;lampLight.intensity=0.5*flicker;ceilLight.intensity=3.5*(0.98+Math.sin(t*1.3)*0.02);}
